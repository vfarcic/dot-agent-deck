[tool.towncrier]
directory = "changelog.d"
filename = "docs/CHANGELOG.md"
title_format = "## [{version}] - {project_date}"
issue_format = "[#{issue}](https://github.com/vfarcic/dot-agent-deck/issues/{issue})"

# feature: New user-facing functionality (users directly interact with or benefit from this)
[[tool.towncrier.type]]
directory = "feature"
name = "Features"
showcontent = true

# bugfix: Bug fixes
[[tool.towncrier.type]]
directory = "bugfix"
name = "Bug Fixes"
showcontent = true

# breaking: A change to the TUI<->daemon protocol/handler contract such that an
# older and a newer build can no longer safely interoperate — including SEMANTIC
# breaks behind a stable wire (a field whose meaning shifts, a role-map value
# type that changes). This is the cross-process compatibility axis, NOT generic
# user-facing breakage; see docs/develop/versioning.md. While major is 0 a
# `breaking` fragment bumps the MINOR digit (feature/bugfix bump patch).
[[tool.towncrier.type]]
directory = "breaking"
name = "Breaking Changes"
showcontent = true

# doc: Documentation improvements only
[[tool.towncrier.type]]
directory = "doc"
name = "Documentation"
showcontent = true

# misc: Internal improvements, CI/CD, tooling, refactoring (improves the project but users don't directly see it)
[[tool.towncrier.type]]
directory = "misc"
name = "Other Changes"
showcontent = true
