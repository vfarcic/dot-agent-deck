name: Docs Publish

on:
  workflow_call:
    inputs:
      image_tag:
        description: 'GHCR image tag to publish (e.g. v0.26.0). Required when called by another workflow.'
        required: true
        type: string
      chart_version:
        description: 'If set, also update Chart.yaml version/appVersion (release path only).'
        required: false
        type: string
        default: ''
      push_latest:
        description: 'Also push :latest tag (release path only).'
        required: false
        type: boolean
        default: false
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: docs-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Resolve image tag
        id: tag
        run: |
          set -euo pipefail
          INPUT_TAG="${{ inputs.image_tag }}"
          if [ -n "${INPUT_TAG}" ]; then
            TAG="${INPUT_TAG}"
            ORIGIN="workflow_call"
          else
            SHORT_SHA=$(git rev-parse --short=7 HEAD)
            TAG="main-${SHORT_SHA}"
            ORIGIN="manual"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "origin=${ORIGIN}" >> "$GITHUB_OUTPUT"

      - name: Compose tag list
        id: tags
        run: |
          {
            echo "list<<EOF"
            echo "ghcr.io/vfarcic/dot-agent-deck-docs:${{ steps.tag.outputs.tag }}"
            if [ "${{ inputs.push_latest }}" = "true" ]; then
              echo "ghcr.io/vfarcic/dot-agent-deck-docs:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push docs image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: site/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.list }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.52.5/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update Helm values
        run: |
          yq -i '.image.tag = "${{ steps.tag.outputs.tag }}"' site/helm/values.yaml

      - name: Update Chart.yaml (release path only)
        if: inputs.chart_version != ''
        run: |
          yq -i '.version = "${{ inputs.chart_version }}"' site/helm/Chart.yaml
          yq -i '.appVersion = "v${{ inputs.chart_version }}"' site/helm/Chart.yaml

      - name: Commit chart changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Sync local main to remote before re-applying our changes so the
          # push at the end fast-forwards cleanly even if main advanced
          # between checkout and this step (e.g. the release workflow's
          # changelog commit pushed in the finalize job).
          git stash --include-untracked || true
          git checkout main
          git pull --rebase --autostash origin main
          git stash pop || true
          git add site/helm/Chart.yaml site/helm/values.yaml
          if git diff --cached --quiet; then
            echo "No chart changes to commit"
            exit 0
          fi
          if [ "${{ steps.tag.outputs.origin }}" = "manual" ]; then
            MSG="chore: publish docs image ${{ steps.tag.outputs.tag }} [skip ci]"
          else
            MSG="chore: update docs chart to ${{ steps.tag.outputs.tag }} [skip ci]"
          fi
          git commit -m "$MSG"
          git push origin main

      - name: Summary
        run: |
          {
            echo "## Docs publish"
            echo ""
            echo "- **Image**: \`ghcr.io/vfarcic/dot-agent-deck-docs:${{ steps.tag.outputs.tag }}\`"
            if [ "${{ inputs.push_latest }}" = "true" ]; then
              echo "- **Also tagged**: \`:latest\`"
            fi
            echo "- **Trigger**: ${{ steps.tag.outputs.origin }}"
          } >> "$GITHUB_STEP_SUMMARY"
