name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'site/**'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'site/**'
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: site/Dockerfile
          load: true
          tags: ghcr.io/vfarcic/dot-agent-deck-docs:test

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: site/Dockerfile
          push: true
          tags: |
            ghcr.io/vfarcic/dot-agent-deck-docs:${{ github.sha }}
            ghcr.io/vfarcic/dot-agent-deck-docs:latest

      - name: Update Helm chart
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          CURRENT=$(yq '.version' site/helm/Chart.yaml)
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          yq -i ".version = \"${MAJOR}.${MINOR}.$((PATCH + 1))\"" site/helm/Chart.yaml
          yq -i ".appVersion = \"${SHORT_SHA}\"" site/helm/Chart.yaml
          yq -i ".image.tag = \"${SHORT_SHA}\"" site/helm/values.yaml

      - name: Commit and push chart changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/helm/Chart.yaml site/helm/values.yaml
          git diff --cached --quiet || git commit -m "chore: update docs chart version [skip ci]"
          git pull --rebase origin main
          git push origin main
