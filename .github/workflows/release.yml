name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Assemble changelog
        id: changelog
        run: |
          chmod +x scripts/assemble-changelog.sh
          CHANGELOG=$(scripts/assemble-changelog.sh "${{ steps.version.outputs.version }}")
          echo "changelog<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
      - name: Commit changelog updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md changelog.d/
          git diff --cached --quiet || git commit -m "docs: update changelog for v${{ steps.version.outputs.version }}"
          git push origin HEAD:main

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_suffix: linux-amd64
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_suffix: linux-arm64
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_suffix: macos-amd64
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_suffix: macos-arm64
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked
      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
      - name: Package
        run: |
          ARTIFACT="dot-agent-deck-${{ needs.prepare.outputs.version }}-${{ matrix.artifact_suffix }}.tar.gz"
          mkdir -p staging
          cp target/${{ matrix.target }}/release/dot-agent-deck staging/
          cd staging
          tar czf "../$ARTIFACT" dot-agent-deck
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: dot-agent-deck-${{ matrix.artifact_suffix }}
          path: ${{ env.ARTIFACT }}

  finalize:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          body: ${{ needs.prepare.outputs.changelog }}
          files: artifacts/*.tar.gz
          fail_on_unmatched_files: true
