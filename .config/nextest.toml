[profile.default]
retries = 0
slow-timeout = { period = "60s", terminate-after = 3 }
fail-fast = false

[profile.default.junit]
path = "target/nextest/default/junit.xml"

[profile.e2e]
slow-timeout = { period = "120s", terminate-after = 2 }

# Decision 28: per-run recording isolation lives inside the harness
# (see `tests/common/mod.rs`) — it scopes every failure dump under
# `<workspace>/target/test-recordings/<run-id>/<test-name>/` where
# `<run-id>` is `NEXTEST_RUN_ID` when nextest is driving the run and a
# process-PID + timestamp fallback otherwise. No setup-script `rm -rf`
# is needed and two concurrent `cargo test-e2e` invocations never
# touch each other's artifacts.
