[profile.default]
retries = 0
slow-timeout = { period = "60s", terminate-after = 3 }
fail-fast = false

[profile.default.junit]
path = "target/nextest/default/junit.xml"

[profile.e2e]
slow-timeout = { period = "120s", terminate-after = 2 }

# Decision 28: wipe the per-test recording dir before every e2e run so a
# previous run's artifacts don't pollute the next failure dump.
[[profile.e2e.scripts]]
filter = "all()"
setup = "wipe-recordings"

[scripts.setup.wipe-recordings]
command = ['sh', '-c', 'rm -rf target/test-recordings']
