[[modes]]
name = "dev"
init_command = "devbox shell"
reactive_panes = 2

[[modes.panes]]
command = "git diff --stat HEAD"
name = "Git Diff"

[[modes.rules]]
pattern = "cargo (test|clippy)"
watch = false

[[modes.rules]]
pattern = "git (log|status|show)"
watch = false

[[orchestrations]]
max_rounds = 3
auto = false

[[orchestrations.roles]]
name = "coder"
command = "devbox run agent-new"
start = true
prompt_template = "Implement the requested changes."

[[orchestrations.roles]]
name = "reviewer"
command = "devbox run agent-new"
start = false
prompt_template = "Review the code changes for correctness, style, and potential issues."
