version: "3"

tasks:
  docs-install:
    desc: Install documentation site dependencies
    dir: site
    cmds:
      - npm install

  docs-dev:
    desc: Start documentation site in dev mode with live reload
    dir: site
    cmds:
      - npm start

  docs-build:
    desc: Build documentation site for production
    dir: site
    cmds:
      - npm run build

  docs-serve:
    desc: Serve the built documentation site locally
    dir: site
    cmds:
      - npm run serve

  checksums:
    desc: Generate SHA256 checksums for release binaries
    dir: dist
    cmds:
      - shasum -a 256 dot-agent-deck-* > checksums.txt

  homebrew-formula:
    desc: Generate Homebrew formula from release binaries (NAME defaults to dot-agent-deck; pass NAME=dot-agent-deck-beta to publish a parallel pre-release formula)
    requires:
      vars: [VERSION]
    vars:
      NAME: '{{.NAME | default "dot-agent-deck"}}'
      CLASS_NAME:
        sh: echo "{{.NAME | default "dot-agent-deck"}}" | awk -F'-' '{for(i=1;i<=NF;i++) printf "%s", toupper(substr($i,1,1)) substr($i,2)}'
      # Each channel declares conflicts_with the other channel's formula name
      # so a user installing one is forced to uninstall the other. The invoked
      # binary is always `dot-agent-deck` regardless of channel — no CLI surface
      # divergence between stable and beta.
      CONFLICTS_WITH: '{{if eq .NAME "dot-agent-deck-beta"}}dot-agent-deck{{else}}dot-agent-deck-beta{{end}}'
      VERSION_NO_V:
        sh: echo "{{.VERSION}}" | sed 's/^v//'
      BASE_URL: https://github.com/vfarcic/dot-agent-deck/releases/download/{{.VERSION}}
      SHA_DARWIN_ARM64:
        sh: grep 'dot-agent-deck-darwin-arm64$' dist/checksums.txt | awk '{print $1}'
      SHA_DARWIN_AMD64:
        sh: grep 'dot-agent-deck-darwin-amd64$' dist/checksums.txt | awk '{print $1}'
      SHA_LINUX_ARM64:
        sh: grep 'dot-agent-deck-linux-arm64$' dist/checksums.txt | awk '{print $1}'
      SHA_LINUX_AMD64:
        sh: grep 'dot-agent-deck-linux-amd64$' dist/checksums.txt | awk '{print $1}'
    cmds:
      - |
        for var in "SHA_DARWIN_ARM64:{{.SHA_DARWIN_ARM64}}" "SHA_DARWIN_AMD64:{{.SHA_DARWIN_AMD64}}" "SHA_LINUX_ARM64:{{.SHA_LINUX_ARM64}}" "SHA_LINUX_AMD64:{{.SHA_LINUX_AMD64}}"; do
          name="${var%%:*}"
          value="${var#*:}"
          if [ -z "$value" ]; then
            echo "Error: $name is empty — check dist/checksums.txt" >&2
            exit 1
          fi
        done
        cat > dist/{{.NAME}}.rb << 'FORMULA'
        class {{.CLASS_NAME}} < Formula
          desc "TUI dashboard for monitoring AI agent sessions"
          homepage "https://github.com/vfarcic/dot-agent-deck"
          version "{{.VERSION_NO_V}}"
          license "MIT"

          conflicts_with "{{.CONFLICTS_WITH}}",
            because: "both install a `dot-agent-deck` binary; only one channel can be active at a time"

          on_macos do
            if Hardware::CPU.arm?
              url "{{.BASE_URL}}/dot-agent-deck-darwin-arm64"
              sha256 "{{.SHA_DARWIN_ARM64}}"
            else
              url "{{.BASE_URL}}/dot-agent-deck-darwin-amd64"
              sha256 "{{.SHA_DARWIN_AMD64}}"
            end
          end

          on_linux do
            if Hardware::CPU.arm?
              url "{{.BASE_URL}}/dot-agent-deck-linux-arm64"
              sha256 "{{.SHA_LINUX_ARM64}}"
            else
              url "{{.BASE_URL}}/dot-agent-deck-linux-amd64"
              sha256 "{{.SHA_LINUX_AMD64}}"
            end
          end

          def install
            bin.install Dir["dot-agent-deck-*"].first => "dot-agent-deck"
          end

          test do
            assert_match "dot-agent-deck", shell_output("#{bin}/dot-agent-deck --help")
          end
        end
        FORMULA
        sed -i.bak -e 's/^        //' dist/{{.NAME}}.rb && rm -f dist/{{.NAME}}.rb.bak

  homebrew-publish:
    desc: Push Homebrew formula to the tap repository (NAME defaults to dot-agent-deck; pass NAME=dot-agent-deck-beta to update the parallel pre-release formula)
    requires:
      vars: [VERSION]
    vars:
      NAME: '{{.NAME | default "dot-agent-deck"}}'
    cmds:
      - |
        if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
          echo "Error: HOMEBREW_TAP_TOKEN environment variable is required"
          exit 1
        fi
        WORK_DIR=$(mktemp -d)
        trap 'rm -rf "$WORK_DIR"' EXIT
        cd "$WORK_DIR"
        git clone --quiet "https://x-access-token:$HOMEBREW_TAP_TOKEN@github.com/vfarcic/homebrew-tap.git" .
        mkdir -p Formula
        cp {{.TASKFILE_DIR}}/dist/{{.NAME}}.rb Formula/{{.NAME}}.rb
        git add Formula/{{.NAME}}.rb
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git diff --cached --quiet || git commit -m "Update {{.NAME}} formula to {{.VERSION}}"
        git push origin main

  scoop-manifest:
    desc: Generate Scoop manifest from release binaries (NAME defaults to dot-agent-deck; pass NAME=dot-agent-deck-beta to publish a parallel pre-release manifest)
    requires:
      vars: [VERSION]
    vars:
      NAME: '{{.NAME | default "dot-agent-deck"}}'
      VERSION_NO_V:
        sh: echo "{{.VERSION}}" | sed 's/^v//'
      BASE_URL: https://github.com/vfarcic/dot-agent-deck/releases/download/{{.VERSION}}
      SHA_WINDOWS_AMD64:
        sh: grep 'dot-agent-deck-windows-amd64.exe$' dist/checksums.txt | awk '{print $1}'
    cmds:
      - |
        cat > dist/{{.NAME}}.json << MANIFEST
        {
            "version": "{{.VERSION_NO_V}}",
            "description": "TUI dashboard for monitoring AI agent sessions",
            "homepage": "https://github.com/vfarcic/dot-agent-deck",
            "license": "MIT",
            "architecture": {
                "64bit": {
                    "url": "{{.BASE_URL}}/dot-agent-deck-windows-amd64.exe",
                    "hash": "{{.SHA_WINDOWS_AMD64}}"
                }
            },
            "bin": [["dot-agent-deck-windows-amd64.exe", "dot-agent-deck"]],
            "checkver": "github",
            "autoupdate": {
                "architecture": {
                    "64bit": {
                        "url": "https://github.com/vfarcic/dot-agent-deck/releases/download/v\$version/dot-agent-deck-windows-amd64.exe"
                    }
                }
            }
        }
        MANIFEST
        sed -i.bak -e 's/^        //' dist/{{.NAME}}.json && rm -f dist/{{.NAME}}.json.bak

  scoop-publish:
    desc: Push Scoop manifest to the bucket repository (NAME defaults to dot-agent-deck; pass NAME=dot-agent-deck-beta to update the parallel pre-release manifest)
    requires:
      vars: [VERSION]
    vars:
      NAME: '{{.NAME | default "dot-agent-deck"}}'
    cmds:
      - |
        if [ -z "$SCOOP_BUCKET_TOKEN" ]; then
          echo "Error: SCOOP_BUCKET_TOKEN environment variable is required"
          exit 1
        fi
        WORK_DIR=$(mktemp -d)
        trap 'rm -rf "$WORK_DIR"' EXIT
        cd "$WORK_DIR"
        git clone --quiet "https://x-access-token:$SCOOP_BUCKET_TOKEN@github.com/vfarcic/scoop-bucket.git" .
        cp {{.TASKFILE_DIR}}/dist/{{.NAME}}.json {{.NAME}}.json
        git add {{.NAME}}.json
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git diff --cached --quiet || git commit -m "Update {{.NAME}} manifest to {{.VERSION}}"
        git push origin main
