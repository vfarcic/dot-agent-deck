[package]
name = "dot-agent-deck"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
ratatui = "0.30"
crossterm = "0.28"
clap = { version = "4", features = ["derive"] }
toml = "0.8"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
semver = "1"
portable-pty = "0.8"
libc = "0.2"
vt100 = "0.16"
futures-util = "=0.3.32"
regex = "1"
open = "5"
terminal-colorsaurus = "1"
unicode-width = "0.2"

[dev-dependencies]
tempfile = "3"
tokio-test = "0.4"
serial_test = "3"
# PRD #77 Decision 22: insta pinned to a specific version, not `latest`,
# so a future patch release cannot silently reshape snapshot diffs.
insta = { version = "=1.47.2", features = ["yaml"] }

[features]
# PRD #77 Decision 6: `cargo test-e2e` (alias) enables this feature so
# the L2 PTY suite compiles in. CI runs `cargo test-fast` only and never
# sees these tests. Each `tests/e2e_*.rs` file opens with
# `#![cfg(feature = "e2e")]`.
e2e = []

[[example]]
name = "send_event"
path = "examples/send_event.rs"
