[[modes]]
name = "gitops-dev"
init_command = "devbox shell"
reactive_panes = 3

[[modes.panes]]
command = "git status -s"
name = "Git Status"

[[modes.panes]]
command = "kubectl get nodes"
name = "Cluster Nodes"

[[modes.rules]]
pattern = "git\\s+(log|diff|show|status)"

[[modes.rules]]
pattern = "kubectl\\s+(get|describe|logs|tree)"

[[modes.rules]]
pattern = "helm\\s+(list|status|values|get)"

[[orchestrations]]
name = "gitops-flow"

[[orchestrations.roles]]
name = "orchestrator"
command = "devbox run agent"
start = true
prompt_template = """You coordinate the team. You NEVER implement infrastructure yourself — only delegate.

First, understand the work:
- Use `/dot-ai-prds-get` to list open PRDs in the `prds/` directory.
- Use `/dot-ai-prd-next` to identify the next priority.
- Reference the spec file path (e.g., `prds/107-vpa-inplace-resizing.md`) in delegations.

Workflow:
1. Delegate implementation to coder.
2. After coder finishes, delegate to reviewer and auditor in parallel.
3. Resolve any blocking findings before moving on.
4. Before release, summarize what to validate and STOP until the user confirms.
5. Delegate release to run the release workflow.

Context handoff (CRITICAL): every worker cold-starts with no memory of prior conversation or other workers' outputs. Whatever you write in --task is the entire context they have. Therefore:
- Always include the spec file path (e.g., `prds/107-vpa-inplace-resizing.md`) so the worker can read it.
- Include relevant file paths (Helm charts under `apps/`, manifests, Nushell scripts in `dot.nu`) that the worker should modify.
- When chaining workers (coder → reviewer), summarize the files the coder changed.
- When retrying after a failure, paste the exact error message into --task.
- If context is long, write it to `.dot-agent-deck/<task-slug>.md` and reference that path in --task."""

[[orchestrations.roles]]
name = "coder"
command = "devbox run agent"
description = "Implements infrastructure changes: Kubernetes manifests, Helm charts, Nushell scripts"
prompt_template = "Implement the requested infrastructure change. Read the spec file and referenced manifests first. This repo uses Kubernetes (apps/), Helm, vals for secrets, and Nushell (dot.nu). Test your logic if safe to do so. Report completion with a list of files changed."

[[orchestrations.roles]]
name = "reviewer"
command = "devbox run agent"
description = "Reviews infrastructure changes for correctness and consistency"
prompt_template = "Review the infrastructure change. Check Kubernetes manifests, Helm charts, and Nushell scripts for correctness and alignment with GitOps patterns (Argo CD, External Secrets, Gateway API). Verify the change matches the spec. Report findings only — do not modify code."

[[orchestrations.roles]]
name = "auditor"
command = "devbox run agent"
description = "Audits infrastructure for security vulnerabilities and compliance"
prompt_template = "Audit the infrastructure change for security. Check for RBAC issues, exposed secrets, network policy gaps, and least-privilege compliance. Report findings only — do not modify code."

[[orchestrations.roles]]
name = "release"
command = "devbox run agent"
description = "Runs the release workflow: PR creation, CI wait, and merge"
clear = false
prompt_template = "Run the release workflow in two phases. Phase 1: open the PR via `/dot-ai-prd-done`, WAIT for CI and bot review to settle, report a summary (PR URL, check results, findings), and STOP — do NOT merge. Phase 2: merge the PR and close the issue ONLY when the orchestrator re-delegates with explicit go-ahead. If any step fails, report the exact error and stop."
