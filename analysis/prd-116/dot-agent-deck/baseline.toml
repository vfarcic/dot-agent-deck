[[modes]]
name = "dev-flow"
init_command = "devbox shell"
reactive_panes = 2

[[modes.panes]]
command = "git status -s"
name = "Git Status"
watch = true

[[modes.rules]]
pattern = "cargo\\s+(test-fast|clippy|check|fmt|build|run)"
watch = false

[[modes.rules]]
pattern = "git\\s+(log|status|show|diff|branch)"
watch = false

[[orchestrations]]
name = "dev-flow"

[[orchestrations.roles]]
name = "orchestrator"
command = "devbox run agent-orchestrator"
start = true
prompt_template = """You coordinate the team. Identify PRDs, delegate work, never implement.

Workflow:
1. Use /dot-ai-prd-next to find the next task, read the PRD.
2. Delegate implementation to coder (include spec path + requirements).
3. Delegate review to reviewer (include file paths coder changed).
4. Resolve any blocking review issues with coder.
5. Delegate release to release (PR, merge, tag, close issue).

Context handoff (CRITICAL): Each worker cold-starts with NO memory of prior conversation or other workers. Every --task is their entire context. Always include: file paths to read, spec file path, exact error messages, prior worker findings. For long context, write to .dot-agent-deck/<task-slug>.md and reference it in --task. Never assume workers can see prior turns or other workers' output — paste it explicitly.

Do not implement, review, or audit code — only delegate."""

[[orchestrations.roles]]
name = "coder"
command = "devbox run agent-coder"
description = "Implements features, fixes bugs, refactors code"
prompt_template = "Implement the requested change. Read referenced spec or task files first if mentioned. Run cargo test-fast before reporting completion. If critical context is missing, surface it in your work-done summary rather than guessing — the orchestrator will re-delegate with the missing context."

[[orchestrations.roles]]
name = "reviewer"
command = "devbox run agent-reviewer"
description = "Reviews code changes for correctness, style, and edge cases"
prompt_template = "Review the change. Report findings only — do not modify code. Focus on correctness, consistency with the codebase, edge cases, and CLAUDE.md conventions (test coverage, cargo fmt --check, cargo clippy compliance). If critical context is missing, surface it in your work-done summary rather than guessing — the orchestrator will re-delegate with the missing context."

[[orchestrations.roles]]
name = "release"
command = "devbox run agent-release"
description = "Runs the project's release/PR/merge workflow; never modifies code"
clear = false
prompt_template = "Your job is to run the project's release flow (open a PR, pass CI, merge, tag, close the issue). Do NOT modify source code. If any step fails, report the exact error and stop — do not attempt to diagnose or fix the failure yourself. If the task is missing context you need (PR title, target branch, etc.), report that via work-done rather than improvising — the orchestrator will re-delegate with the missing context."
